services:
  claude-remote:
    # Pre-built by CI and published to GHCR (see .github/workflows/build.yml).
    # Update flow: push to main → Actions rebuilds → `docker compose pull` on the box.
    image: ghcr.io/codeincontext/life-ops-agent:latest
    container_name: claude-remote
    restart: unless-stopped
    # A Remote Control session is an interactive TUI; give it a pty + stdin so
    # it behaves, and so you can `docker exec -it` in to log in the first time.
    stdin_open: true
    tty: true
    environment:
      TZ: Europe/Paris
      # Display name of the Remote Control session in the Claude app / web.
      SESSION_NAME: ${SESSION_NAME:-life-ops-agent}
    volumes:
      # Login + connector auth live here; named volume = survives rebuilds.
      - claude-config:/home/node/.claude
      # The claude-admin project (CLAUDE.md, .claude/skills, memory) — so the
      # session has your instructions and the daily-triage skill.
      - ${PROJECT_PATH:?set PROJECT_PATH in .env}:/project
      # Vault volume owned by this stack (not shared) — simplest ownership.
      - obsidian-vault:/vault
      # Obsidian Sync login + sync config for the in-container `ob` sync client.
      - ob-config:/home/node/.config/obsidian-headless
    # No ports published: Remote Control only needs OUTBOUND https to
    # api.anthropic.com. Nothing inbound to expose — your phone reaches the
    # session via Anthropic, not by connecting to the box.

volumes:
  claude-config:
  # Vault owned by this stack. The image pre-creates /vault owned by `node`, so
  # this volume initialises node-writable. If you later want it shared across
  # containers (e.g. an obsidian-headless sync service), make it `external: true`
  # and ensure all of them use the same uid.
  obsidian-vault:
  # Obsidian Sync login + sync config for the in-container `ob` client.
  ob-config:
