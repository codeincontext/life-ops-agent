name: build

# Build the container and publish it to GHCR so the Dockge stack can just
# pull `ghcr.io/codeincontext/life-ops-agent:latest` (no building on the box).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.env.example'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/codeincontext/life-ops-agent:latest
            ghcr.io/codeincontext/life-ops-agent:${{ github.sha }}
